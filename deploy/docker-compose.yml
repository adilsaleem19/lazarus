name: lazarus

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lazarus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lazarus}
      POSTGRES_DB: ${POSTGRES_DB:-lazarus}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lazarus}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment: &backend_env
      LAZARUS_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lazarus}:${POSTGRES_PASSWORD:-lazarus}@postgres:5432/${POSTGRES_DB:-lazarus}
      LAZARUS_REDIS_URL: redis://redis:6379/0
      LAZARUS_USER_AGENT: ${LAZARUS_USER_AGENT:-LazarusBot/0.1 (+set LAZARUS_USER_AGENT in .env)}
      LAZARUS_ENVIRONMENT: ${LAZARUS_ENVIRONMENT:-dev}
      LAZARUS_LLM_PROVIDER: ${LAZARUS_LLM_PROVIDER:-groq}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - ../backend:/srv/backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile.worker
    command: arq app.worker.WorkerSettings
    environment: *backend_env
    volumes:
      - ../backend:/srv/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
    command: npm run dev
    volumes:
      - ../frontend:/srv/frontend
      - /srv/frontend/node_modules
      - /srv/frontend/.next
    ports:
      - "3000:3000"

  caddy:
    image: caddy:2-alpine
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "8080:8080"
    depends_on:
      - api
      - frontend

volumes:
  pgdata:
  caddy_data:
  caddy_config:
