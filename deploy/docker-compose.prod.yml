# Production overrides for the single 4GB VPS.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
services:
  api:
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1"
    volumes: []
    ports: []
    restart: unless-stopped
    mem_limit: 512m
    environment:
      LAZARUS_ENVIRONMENT: prod

  worker:
    volumes: []
    restart: unless-stopped
    # Playwright + 2 Chromium contexts live here; the biggest slice of the 4GB budget.
    mem_limit: 1536m
    shm_size: 256m
    environment:
      LAZARUS_ENVIRONMENT: prod

  frontend:
    command: npm run start
    volumes: []
    ports: []
    restart: unless-stopped
    mem_limit: 384m

  postgres:
    restart: unless-stopped
    mem_limit: 512m

  redis:
    restart: unless-stopped
    mem_limit: 320m

  caddy:
    restart: unless-stopped
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    environment:
      LAZARUS_DOMAIN: ${LAZARUS_DOMAIN:?set LAZARUS_DOMAIN in .env, e.g. lazarus.203-0-113-7.nip.io}
